; ESP32 "WiFi modem" firmware for the Maixduino's onboard ESP32.
; Replaces nina-fw(SPI) with a tiny UART0 command protocol so the K210 can do WiFi
; over IO6/IO7 -- independent of the camera's SPI0 pads (no capture wedge).
;
; Build:  pio run
; Flash:  use ../esp32-firmware/flash-esp32.sh on the merged/firmware bins
;         (PlatformIO's own upload can't drive this board's CH552 reset).
; A/B test: arduino-esp32 3.x / ESP-IDF 5.5 (the home WPA2 AP won't associate under
; the older idf-4.4 build -- AUTH_EXPIRE, assoc never completes -- while nina-fw
; idf-3.3 connects fine, so testing whether a newer idf fixes the association).
[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.flash_mode = dio
build_flags = -DCORE_DEBUG_LEVEL=0
